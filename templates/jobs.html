{% extends "base.html" %}
{% block title %}Jobs{% endblock %}

{% block content %}

<form method="POST" action="/add_job" class="mb-4">
    <input name="title" placeholder="Job title" class="p-2 border rounded">
    <input name="skills" placeholder="Skills (Python, SQL)" class="p-2 border rounded">
    <button class="bg-indigo-500 text-white px-4 py-2 rounded">Add</button>
</form>

{% for j in jobs %}
<div class="glass-card flex justify-between items-center mb-2">
    <span>{{ j.job_title }}</span>

    <div class="flex gap-2">
        <a href="/edit_job/{{j.job_id}}" class="text-blue-500">Edit</a>
        <a href="/delete_job/{{j.job_id}}" class="text-red-500" onclick="return confirm('Delete this?')">Delete</a>
    </div>
</div>
{% endfor %}

{% endblock %}
