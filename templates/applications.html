{% extends "base.html" %}
{% block title %}Applications{% endblock %}

{% block content %}

<form method="POST" action="/add_application" class="mb-4">
    <input name="job_id" placeholder="Job ID" class="p-2 border rounded">
    <button class="bg-indigo-500 text-white px-4 py-2 rounded">Add</button>
</form>

{% for a in applications %}
<div class="glass-card flex justify-between items-center mb-2">
    <span>{{ a.job_title }} - {{ a.status }}</span>

    <div class="flex gap-2">
        <a href="/edit_application/{{a.application_id}}" class="text-blue-500">Edit</a>
        <a href="/delete_application/{{a.application_id}}" class="text-red-500" onclick="return confirm('Delete this?')">Delete</a>
    </div>
</div>
{% endfor %}

{% endblock %}
